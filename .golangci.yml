version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose     # Mendeteksi handler HTTP yang lupa di-close body-nya
    - gosec         # Security scanner untuk mendeteksi celah keamanan potensial
    - govet         # Linter bawaan Go untuk mengecek construct mencurigakan
    - ineffassign   # Mendeteksi assignment yang tidak pernah dibaca/dipakai
    - revive        # Alternatif modern untuk golint (style & best practice check)
    - staticcheck   # Kumpulan puluhan aturan analisis statis untuk kualitas kode
    - unused        # Mengecek fungsi, variabel, tipe, atau konstanta yang tidak dipakai

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
